<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記錄狀態中...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #333;
        }
        .message {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .btn {
            /* 預設先隱藏，幾秒後如果沒跳轉再顯示出來 */
            display: none; 
            padding: 12px 24px;
            background-color: #007aff;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="message" id="status-text">正在為你開啟 Apple 捷徑...</div>
    <a href="shortcuts://run-shortcut?name=LogMindState" class="btn" id="fallback-btn">手動開啟捷徑</a>

    <script>
        // 設定你要喚醒的捷徑 URL
        const shortcutUrl = "shortcuts://run-shortcut?name=LogMindState";

        // 網頁載入完成後立刻嘗試自動跳轉
        window.onload = function() {
            window.location.href = shortcutUrl;

            // 如果過了 1.5 秒網頁還在（代表跳轉可能被 Telegram 擋下），就顯示手動按鈕
            setTimeout(function() {
                document.getElementById('status-text').innerText = "如果沒有自動跳出，請點擊下方按鈕：";
                document.getElementById('fallback-btn').style.display = 'block';
            }, 1500);
        };
    </script>

</body>
</html>
